name: fall_detection_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sensors_plus: ^3.0.3
  tflite_flutter: ^0.9.1
  tflite_flutter_helper: ^0.2.0
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/model/fall_model.tflite
    - assets/demo/STD_SubjectA_01.csv
    - assets/demo/WAL_SubjectA_01.csv
    - assets/demo/FALL_SubjectA_01.csv

dependency_overrides:
  tflite_flutter_helper:
    path: third_party/tflite_flutter_helper
